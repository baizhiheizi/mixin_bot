require:
  - rubocop-rake

AllCops:
  NewCops: enable
  SuggestExtensions: true
  TargetRubyVersion: '3.2'
  Exclude:
    - bin/**/*
    - db/**/*
    - tmp/**/*
    - vendor/**/*

# SDK methods often mirror Go client signatures (long keyword lists, get_* names).
Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/ParameterLists:
  Max: 8
  CountKeywordArgs: true

Naming/AccessorMethodName:
  Exclude:
    - lib/mixin_bot/api/computer_api.rb

Naming/PredicateName:
  Enabled: true

Layout/LineLength:
  Max: 140
  Exclude:
    - test/**/*

Layout/TrailingWhitespace:
  AllowInHeredoc: true

Lint/FormatParameterMismatch:
  Enabled: false

Lint/UnderscorePrefixedVariableName:
  Enabled: false

Security/Eval:
  Enabled: false

Style/AsciiComments:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/EmptyMethod:
  Enabled: false

Style/NumericLiterals:
  Enabled: false
