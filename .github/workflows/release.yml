name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build gem only (do not push to RubyGems)
        type: boolean
        default: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches gem version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version=$(ruby -r ./lib/mixin_bot/version -e 'puts MixinBot::VERSION')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "Tag ${tag} does not match gem version ${expected}"
            exit 1
          fi
          echo "Tag ${tag} matches MixinBot::VERSION ${version}"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Extract release notes from CHANGELOG
        if: github.event_name == 'push'
        run: |
          export VERSION
          VERSION=$(ruby -r ./lib/mixin_bot/version -e 'puts MixinBot::VERSION')
          ruby -e '
            version = ENV.fetch("VERSION")
            content = File.read("CHANGELOG.md")
            pattern = /^## \[#{Regexp.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\z)/m
            section = content.match(pattern)
            if section.nil?
              warn "No CHANGELOG section for version #{version}"
              exit 1
            end
            File.write("release-notes.md", section[1].strip + "\n")
          '

      - name: Configure RubyGems credentials
        if: github.event_name == 'push' || inputs.dry_run != true
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Publish to RubyGems
        if: github.event_name == 'push' || inputs.dry_run != true
        run: gem push mixin_bot-*.gem

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: mixin_bot-*.gem
          body_path: release-notes.md
          generate_release_notes: false
